<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nugget</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="mobile-bar">
    <button id="menu-btn">&#9776;</button>
    <span class="logo">nugget</span>
  </div>
  <div id="sidebar-overlay"></div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="logo">nugget</span>
      <button id="new-session-btn" title="New session">+</button>
    </div>
    <div id="session-list"></div>
  </div>

  <div class="main">
    <div id="messages"></div>
    <div class="view-toggles">
      <button class="toggle-btn active" data-toggle="thinking">thinking</button>
      <button class="toggle-btn active" data-toggle="tool-calls">tool calls</button>
      <button class="toggle-btn active" data-toggle="tool-results">tool results</button>
    </div>
    <div class="input-area">
      <textarea id="input" placeholder="Message…" rows="1"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
